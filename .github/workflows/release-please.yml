name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - if: ${{ steps.release.outputs.release_created }}
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build.yml
          inputs: '{"tag_name": "${{ steps.release.outputs.tag_name }}", "upload_release": "true"}'
